*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Montserrat',Arial,sans-serif;background:#FAF9F5}

.model-bar{background:#253464;padding:6px 24px;display:flex;align-items:center;gap:10px}
.model-badge{font-size:10px;font-weight:800;color:#193F7D;background:#F6B707;padding:2px 8px;letter-spacing:0.06em}
.model-label{font-size:11px;color:rgba(255,255,255,0.7);font-weight:400}
.sys-selector{display:flex;gap:0;padding:0 24px;background:#193F7D;border-bottom:2px solid #F6B707;overflow-x:auto}
.sys-btn{font-family:'Montserrat',Arial,sans-serif;padding:9px 16px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:0.06em;border:none;background:none;color:rgba(255,255,255,0.5);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all 0.15s;white-space:nowrap}
.sys-btn:hover{color:#fff}
.sys-btn.active{color:#F6B707;border-bottom-color:#F6B707}
.main{padding:20px 24px;background:#FAF9F5;min-height:400px}
.comp-header{margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid #F6B707}
.comp-title{font-size:17px;font-weight:800;color:#193F7D;text-transform:uppercase;letter-spacing:0.03em}
.comp-sub{font-size:11px;color:#6EC1E4;font-weight:700;margin-top:3px;text-transform:uppercase;letter-spacing:0.06em}
.layout{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start}
.layout-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.tools-block{margin-bottom:14px}
.tools-type-label{font-size:10px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:0.1em;padding:3px 8px;display:inline-block;margin-bottom:5px}
.tools-type-label.sw{background:#193F7D}
.tools-type-label.hw{background:#253464}
.tools-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.pill-sw{font-family:'Montserrat',Arial,sans-serif;font-size:10px;font-weight:700;padding:4px 10px;background:#193F7D;color:#F6B707;text-transform:uppercase;letter-spacing:0.04em;display:inline-flex;align-items:center;gap:4px}
.pill-sw::before{content:'';display:inline-block;width:6px;height:6px;background:#F6B707;border-radius:50%}
.pill-hw{font-family:'Montserrat',Arial,sans-serif;font-size:10px;font-weight:700;padding:4px 10px;background:#fff;color:#253464;border:1.5px solid #253464;text-transform:uppercase;letter-spacing:0.04em;display:inline-flex;align-items:center;gap:4px}
.pill-hw::before{content:'';display:inline-block;width:6px;height:6px;background:#253464;border-radius:0}
.section-label{font-size:10px;font-weight:800;color:#193F7D;text-transform:uppercase;letter-spacing:0.12em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.section-label::after{content:'';flex:1;height:1px;background:#F6B707}
.param-card{background:#fff;border-left:3px solid #F6B707;padding:7px 10px;margin-bottom:5px}
.param-key{font-size:9px;color:#193F7D;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:2px}
.param-val{font-size:11px;color:#212121;font-weight:500}
.step{display:flex;gap:8px;padding:7px 0;border-bottom:0.5px solid #e8e5dc}
.step:last-child{border-bottom:none}
.step-num{width:22px;height:22px;background:#193F7D;color:#fff;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.step-title{font-size:11px;font-weight:700;color:#193F7D}
.step-desc{font-size:10px;color:#212121;margin-top:2px;line-height:1.5;font-weight:400}
.warn-box{display:flex;gap:6px;padding:8px 10px;margin-top:10px;border-left:3px solid #F6B707;background:#fff}
.danger-box{display:flex;gap:6px;padding:8px 10px;margin-top:8px;border-left:3px solid #A32D2D;background:#FCEBEB}
.warn-text{font-size:10px;color:#212121;line-height:1.4;font-weight:500}
.danger-text{font-size:10px;color:#A32D2D;line-height:1.4;font-weight:600}
/* Switch table */
.sw-table{width:100%;border-collapse:collapse;font-size:10px;margin-top:6px}
.sw-table th{text-align:left;padding:5px 8px;background:#193F7D;color:#fff;font-weight:700;text-transform:uppercase;letter-spacing:0.04em}
.sw-table td{padding:5px 8px;border-bottom:0.5px solid #e0ddd5;font-weight:500;color:#212121}
.sw-table tr:nth-child(even) td{background:#fff}
.sw-table tr:nth-child(odd) td{background:#FAF9F5}
.sw-table .sw-on{font-weight:800;color:#193F7D}
.code-inline{font-family:monospace;background:#253464;color:#F6B707;padding:2px 6px;font-size:10px;font-weight:700}
.info-badge{display:inline-block;font-size:9px;font-weight:800;background:#EEF2FF;color:#193F7D;padding:2px 7px;border:0.5px solid #193F7D;text-transform:uppercase;margin-bottom:6px}
.footer-bar{background:#193F7D;padding:7px 24px;display:flex;align-items:center;justify-content:space-between}
.footer-bar span{font-size:9px;color:rgba(255,255,255,0.5)}
.footer-bar strong{font-size:9px;color:#F6B707;font-weight:700}
</style>
