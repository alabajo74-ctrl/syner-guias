
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Montserrat',Arial,sans-serif;background:#FAF9F5}
.app-header{background:#193F7D;position:relative;overflow:hidden}
.app-header-inner{display:flex;align-items:center;justify-content:space-between;padding:14px 24px}
.brand{display:flex;flex-direction:column;gap:2px}
.brand-name{font-size:22px;font-weight:800;color:#fff;letter-spacing:-0.5px;line-height:1}
.brand-name span{color:#F6B707}
.brand-tag{display:inline-block;background:#F6B707;color:#193F7D;font-size:9px;font-weight:700;padding:2px 7px;letter-spacing:0.08em}
.header-title{color:#fff;font-size:13px;font-weight:500;opacity:0.85;text-align:right;line-height:1.4}
.diag-accent{position:absolute;right:0;top:0;width:60px;height:100%;background:#F6B707;clip-path:polygon(30% 0,100% 0,100% 100%,0% 100%);opacity:0.18}
.gama-bar{background:#002664;padding:6px 24px;display:flex;align-items:center;gap:10px}
.gama-badge{font-size:10px;font-weight:800;color:#193F7D;background:#F6B707;padding:2px 8px;letter-spacing:0.06em}
.gama-label{font-size:11px;color:rgba(255,255,255,0.7);font-weight:400}
.section-bar{background:#253464;padding:10px 24px;display:flex;align-items:center;gap:8px}
.section-bar-label{font-size:11px;font-weight:700;color:#F6B707;text-transform:uppercase;letter-spacing:0.1em}
.section-bar-sub{font-size:11px;color:rgba(255,255,255,0.6)}
.comp-grid{display:flex;flex-wrap:wrap;gap:8px;padding:14px 24px;background:#fff;border-bottom:2px solid #F6B707}
.comp-btn{font-family:'Montserrat',Arial,sans-serif;display:flex;align-items:center;gap:6px;padding:7px 12px;border:1.5px solid #193F7D;background:#fff;color:#193F7D;font-size:11px;font-weight:700;cursor:pointer;transition:all 0.15s;text-transform:uppercase;letter-spacing:0.04em}
.comp-btn:hover{background:#193F7D;color:#fff}
.comp-btn.active{background:#193F7D;color:#fff}
.comp-btn .tag{font-size:9px;font-weight:700;background:#F6B707;color:#193F7D;padding:1px 5px;margin-left:2px}
.legend{display:flex;gap:16px;align-items:center;padding:7px 24px;background:#FAF9F5;border-bottom:0.5px solid #e0ddd5}
.legend-item{display:flex;align-items:center;gap:5px;font-size:9px;font-weight:700;color:#253464;text-transform:uppercase;letter-spacing:0.06em}
.leg-sw{width:9px;height:9px;background:#193F7D;border-radius:50%}
.leg-hw{width:9px;height:9px;background:#fff;border:1.5px solid #253464}
.main{padding:20px 24px;background:#FAF9F5}
.comp-header{margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid #F6B707}
.comp-title{font-size:17px;font-weight:800;color:#193F7D;text-transform:uppercase;letter-spacing:0.03em}
.comp-sub{font-size:11px;color:#6EC1E4;font-weight:700;margin-top:3px;text-transform:uppercase;letter-spacing:0.06em}
.layout{display:grid;grid-template-columns:260px 1fr;gap:20px;align-items:start}
.infographic-wrap{background:#fff;border:0.5px solid #ddd;overflow:hidden}
.infographic-wrap svg{display:block;width:100%}
.tools-block{margin-bottom:12px}
.tools-type-label{font-size:10px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:0.1em;padding:3px 8px;display:inline-block;margin-bottom:5px}
.tools-type-label.sw{background:#193F7D}
.tools-type-label.hw{background:#253464}
.tools-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.pill-sw{font-family:'Montserrat',Arial,sans-serif;font-size:10px;font-weight:700;padding:4px 10px;background:#193F7D;color:#F6B707;border:none;text-transform:uppercase;letter-spacing:0.04em;display:inline-flex;align-items:center;gap:4px}
.pill-sw::before{content:'';display:inline-block;width:6px;height:6px;background:#F6B707;border-radius:50%}
.pill-hw{font-family:'Montserrat',Arial,sans-serif;font-size:10px;font-weight:700;padding:4px 10px;background:#fff;color:#253464;border:1.5px solid #253464;text-transform:uppercase;letter-spacing:0.04em;display:inline-flex;align-items:center;gap:4px}
.pill-hw::before{content:'';display:inline-block;width:6px;height:6px;background:#253464;border-radius:0}
.tabs{display:flex;gap:0;margin-bottom:14px;border-bottom:2px solid #F6B707}
.tab-btn{font-family:'Montserrat',Arial,sans-serif;padding:7px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;border:none;background:none;color:#193F7D;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all 0.15s}
.tab-btn:hover{background:#f0f0f0}
.tab-btn.active{background:#193F7D;color:#F6B707;border-bottom-color:#193F7D}
.tab-content{display:none}
.tab-content.active{display:block}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.section-label{font-size:10px;font-weight:800;color:#193F7D;text-transform:uppercase;letter-spacing:0.12em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.section-label::after{content:'';flex:1;height:1px;background:#F6B707}
.param-card{background:#FAF9F5;border-left:3px solid #F6B707;padding:6px 8px;margin-bottom:5px}
.param-key{font-size:9px;color:#193F7D;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:1px}
.param-val{font-size:11px;color:#212121;font-weight:500}
.step{display:flex;gap:8px;padding:6px 0;border-bottom:0.5px solid #e8e5dc}
.step:last-child{border-bottom:none}
.step-num{width:20px;height:20px;background:#193F7D;color:#fff;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-title{font-size:11px;font-weight:700;color:#193F7D}
.step-desc{font-size:10px;color:#212121;margin-top:1px;line-height:1.4;font-weight:400}
.err-table{width:100%;border-collapse:collapse;font-size:10px}
.err-table th{text-align:left;padding:6px 8px;background:#193F7D;color:#fff;font-weight:700;text-transform:uppercase;letter-spacing:0.04em}
.err-table td{padding:5px 8px;border-bottom:0.5px solid #e0ddd5;vertical-align:top}
.err-table tr:nth-child(even) td{background:#fff}
.err-table tr:nth-child(odd) td{background:#FAF9F5}
.err-code{font-weight:800;color:#193F7D;white-space:nowrap}
.err-name{font-weight:700;color:#212121}
.err-action{color:#555;font-weight:400;line-height:1.4}
.warn-box{display:flex;gap:6px;padding:8px 10px;margin-top:8px;border-left:3px solid #F6B707;background:#fff}
.danger-box{display:flex;gap:6px;padding:8px 10px;margin-top:6px;border-left:3px solid #E3A414;background:#fff8ee}
.warn-text{font-size:10px;color:#212121;line-height:1.4;font-weight:500}
.danger-text{font-size:10px;color:#5a3e00;line-height:1.4;font-weight:500}
.footer-bar{background:#193F7D;padding:7px 24px;display:flex;align-items:center;justify-content:space-between}
.footer-bar span{font-size:9px;color:rgba(255,255,255,0.5)}
.footer-bar strong{font-size:9px;color:#F6B707;font-weight:700}
</style>

<div class="main" id="main"></div>
<div class="footer-bar">

</div>

function renderGrid(){
  document.getElementById('comp-grid').innerHTML=C.map((c,i)=>`
    <button class="comp-btn${i===0?' active':''}" onclick="show(${i})" id="btn-${i}">
      ${c.name}<span class="tag">${c.tag}</span>
    </button>`).join('');
}

function showTab(id,tab){
  document.querySelectorAll(`#tc-${id} .tab-content`).forEach(t=>t.classList.remove('active'));
  document.querySelectorAll(`#tb-${id} .tab-btn`).forEach(t=>t.classList.remove('active'));
  document.getElementById(`tab-${id}-${tab}`).classList.add('active');
  document.getElementById(`tc-${id}-${tab}`).classList.add('active');
}

function show(idx){
  document.querySelectorAll('.comp-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  const c=C[idx]; const id=c.id;
  let toolsHtml='<div class="tools-block">';
  if(c.software&&c.software.length) toolsHtml+=`<div class="tools-type-label sw">Software</div><div class="tools-row">${c.software.map(t=>`<span class="pill-sw">${t}</span>`).join('')}</div>`;
  if(c.hardware&&c.hardware.length) toolsHtml+=`<div class="tools-type-label hw">Herramienta física</div><div class="tools-row">${c.hardware.map(t=>`<span class="pill-hw">${t}</span>`).join('')}</div>`;
  toolsHtml+='</div>';

  const configTab=`
    <div class="two-col">
      <div>
        <div class="section-label">Parámetros</div>
        ${c.params.map(p=>`<div class="param-card"><div class="param-key">${p.k}</div><div class="param-val">${p.v}</div></div>`).join('')}
      </div>
      <div>
        <div class="section-label">Procedimiento</div>
        ${c.steps.map((s,i)=>`<div class="step"><div class="step-num">${i+1}</div><div><div class="step-title">${s.t}</div><div class="step-desc">${s.d}</div></div></div>`).join('')}
      </div>
    </div>
    ${(c.warns&&c.warns.length)?c.warns.map(w=>w.type==='danger'
      ?`<div class="danger-box"><span style="color:#E3A414;font-weight:800;font-size:12px;flex-shrink:0">!</span><div class="danger-text">${w.text}</div></div>`
      :`<div class="warn-box"><span style="color:#F6B707;font-weight:800;font-size:12px;flex-shrink:0">!</span><div class="warn-text">${w.text}</div></div>`
    ).join(''):''}
  `;
  const errTab=`
    <div class="section-label">Códigos de avería</div>
    <table class="err-table">
      <tr><th style="width:100px">Código</th><th style="width:160px">Nombre</th><th>Causa / Acción correctiva</th></tr>
      ${c.errors.map(e=>`<tr><td class="err-code">${e.code}</td><td class="err-name">${e.name}</td><td class="err-action">${e.action}</td></tr>`).join('')}
    </table>
  `;

  document.getElementById('main').innerHTML=`
    <div class="comp-header">
      <div class="comp-title">${c.name}</div>
      <div class="comp-sub">${c.subtitle}</div>
    </div>
    <div class="layout">
      <div class="infographic-wrap">${svgs[id]||''}</div>
      <div>
        ${toolsHtml}
        <div class="tabs" id="tb-${id}">
          <button class="tab-btn active" id="tab-${id}-config" onclick="showTab('${id}','config')">Configuración</button>
          <button class="tab-btn" id="tab-${id}-errors" onclick="showTab('${id}','errors')">Códigos de avería (${c.errors.length})</button>
        </div>
        <div id="tc-${id}">
          <div class="tab-content active" id="tc-${id}-config">${configTab}</div>
          <div class="tab-content" id="tc-${id}-errors">${errTab}</div>
        </div>
      </div>
    </div>
  `;
}

renderGrid();
show(0);
</script>
