.model-bar{background:#253464;padding:6px 24px;display:flex;align-items:center;gap:10px}
.model-badge{font-size:10px;font-weight:800;color:#193F7D;background:#F6B707;padding:2px 8px;letter-spacing:0.06em}
.model-label{font-size:11px;color:rgba(255,255,255,0.7);font-weight:400}
.sys-selector{display:flex;gap:0;padding:0 24px;background:#193F7D;border-bottom:2px solid #F6B707;overflow-x:auto}

.sys-btn:hover{color:#fff}
.sys-btn.active{color:#F6B707;border-bottom-color:#F6B707}
.main{padding:20px 24px;background:#FAF9F5;min-height:400px}
.comp-header{margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid #F6B707}

.err-section-title::after{content:'';flex:1;height:1px;background:#F6B707}

.err-card.expanded{border-left-color:#F6B707}
.err-card.danger{border-left-color:#A32D2D}
.err-card.danger:hover,.err-card.danger.expanded{border-left-color:#F6B707}
.err-card-header{display:flex;align-items:center;gap:10px;padding:9px 14px}
.err-code-badge{font-size:11px;font-weight:800;color:#fff;background:#193F7D;padding:4px 8px;min-width:110px;text-align:center;flex-shrink:0;line-height:1.3}
.err-card.danger .err-code-badge{background:#A32D2D}
.err-card.warn .err-code-badge{background:#854F0B}
.err-card-info{flex:1}
.err-card-name{font-size:12px;font-weight:700;color:#212121}
.err-card-msg{font-size:10px;color:#6EC1E4;font-weight:600;margin-top:1px;font-style:italic}
.err-chevron{font-size:16px;color:#193F7D;font-weight:800;transition:transform 0.2s;flex-shrink:0}
.err-card.expanded .err-chevron{transform:rotate(90deg)}
.err-card-body{display:none;padding:0 14px 12px;border-top:0.5px solid #f0ece3}
.err-card.expanded .err-card-body{display:block}
.err-detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.err-detail-box{background:#FAF9F5;border-left:3px solid #F6B707;padding:8px 10px}
.err-detail-label{font-size:9px;font-weight:800;color:#193F7D;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:3px}
.err-detail-val{font-size:11px;color:#212121;font-weight:500;line-height:1.4}
.err-action-box{margin-top:10px;background:#193F7D;padding:10px 12px;display:flex;gap:8px;align-items:flex-start}
.err-action-icon{color:#F6B707;font-weight:800;font-size:14px;flex-shrink:0;margin-top:1px}
.err-action-text{font-size:11px;color:#fff;font-weight:500;line-height:1.5}
.err-danger-note{background:#FCEBEB;border-left:3px solid #A32D2D;padding:8px 10px;margin-top:8px}
.err-danger-text{font-size:11px;color:#A32D2D;font-weight:600;line-height:1.4}
.legend{display:flex;gap:16px;align-items:center;padding:7px 24px;background:#FAF9F5;border-bottom:0.5px solid #e0ddd5}
.legend-item{display:flex;align-items:center;gap:6px;font-size:9px;font-weight:700;color:#253464;text-transform:uppercase;letter-spacing:0.06em}
.leg-dot{width:12px;height:12px;flex-shrink:0}
.footer-bar{background:#193F7D;padding:7px 24px;display:flex;align-items:center;justify-content:space-between}
.footer-bar span{font-size:9px;color:rgba(255,255,255,0.5)}
.footer-bar strong{font-size:9px;color:#F6B707;font-weight:700}
</style>

let expanded={};

function show(id,btn){
  document.querySelectorAll('.sys-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  expanded={};
  renderPage(id);
}

function toggleCard(sys,gi,ii){
  const k=`${sys}-${gi}-${ii}`;
  expanded[k]=!expanded[k];
  renderPage(sys);
}

function renderPage(id){
  const d=DATA[id];
  if(!d){document.getElementById('main').innerHTML='';return;}
  let html=`<div class="comp-header"><div class="comp-title">${d.title}</div><div class="comp-sub">${d.sub}</div></div>`;
  d.grupos.forEach((g,gi)=>{
    html+=`<div class="err-section-title">${g.titulo}</div>`;
    g.items.forEach((e,ii)=>{
      const k=`${id}-${gi}-${ii}`;
      const isExp=!!expanded[k];
      const sevClass=e.sev==='danger'?'danger':e.sev==='warn'?'warn':'';
      html+=`<div class="err-card ${sevClass}${isExp?' expanded':''}" onclick="toggleCard('${id}',${gi},${ii})">
        <div class="err-card-header">
          <div class="err-code-badge">${e.code}</div>
          <div class="err-card-info">
            <div class="err-card-name">${e.name}</div>
            ${e.msg?`<div class="err-card-msg">"${e.msg}"</div>`:''}
          </div>
          <div class="err-chevron">›</div>
        </div>
        ${isExp?`<div class="err-card-body">
          <div class="err-detail-grid">
            <div class="err-detail-box"><div class="err-detail-label">Causa probable</div><div class="err-detail-val">${e.cause}</div></div>
            <div class="err-detail-box"><div class="err-detail-label">Sistema</div><div class="err-detail-val">${d.title}</div></div>
          </div>
          <div class="err-action-box">
            <div class="err-action-icon">→</div>
            <div class="err-action-text"><strong style="color:#F6B707">Acción correctiva:</strong> ${e.action}</div>
          </div>
          ${e.sev==='danger'?'<div class="err-danger-note"><div class="err-danger-text">⚠ Error crítico — puede requerir sustitución de componente o parada del AGV.</div></div>':''}
        </div>`:''}
      </div>`;
    });
  });
  document.getElementById('main').innerHTML=html;
}

renderPage('hmi');
</script>
