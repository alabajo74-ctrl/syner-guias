let currentSys='all', currentSearch='', expandedIdx=null;

function setSys(s){
  currentSys=s;
  document.querySelectorAll('.sys-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  if(currentSearch) renderResults();
  else if(s!=='all') renderResults();
  else showWelcome();
}

function doSearch(){
  currentSearch=document.getElementById('search-input').value.trim().toLowerCase();
  if(!currentSearch && currentSys==='all'){ showWelcome(); return; }
  renderResults();
}

function clearSearch(){
  document.getElementById('search-input').value='';
  currentSearch='';
  currentSys='all';
  document.querySelectorAll('.sys-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.sys-btn').classList.add('active');
  showWelcome();
}

function useHint(q){
  document.getElementById('search-input').value=q;
  currentSearch=q.toLowerCase();
  renderResults();
}

function showWelcome(){
  document.getElementById('results-header').style.display='none';
  document.getElementById('results-list').innerHTML=`
    <div class="welcome-state">
      <div class="welcome-icon"><div class="welcome-q">?</div></div>
      <div class="welcome-title">¿Qué error estás viendo?</div>
      <div class="welcome-sub">Introduce el código o síntoma en el buscador, o selecciona un sistema en las pestañas superiores para filtrar los errores.</div>
      <div class="welcome-hints">
        <button class="hint-btn" onclick="useHint('EDM')">Error EDM</button>
        <button class="hint-btn" onclick="useHint('batería')">Batería</button>
        <button class="hint-btn" onclick="useHint('escáner')">Escáner</button>
        <button class="hint-btn" onclick="useHint('variador')">Variador</button>
        <button class="hint-btn" onclick="useHint('guía')">Pérdida de guía</button>
        <button class="hint-btn" onclick="useHint('temperatura')">Temperatura</button>
        <button class="hint-btn" onclick="useHint('comunicación')">Comunicación</button>
        <button class="hint-btn" onclick="useHint('danger')">Solo críticos</button>
      </div>
    </div>`;
}

function toggleCard(idx){
  expandedIdx=expandedIdx===idx?null:idx;
  renderResults();
}

const sysLabels={reset:'Botón Reset',pid:'Placa PID',variador:'Variadores BLV/BLH',lcd:'Consola LCD',vsystems:'VSystems / Periféricos',flexi:'FlexiSoft SICK'};

function renderResults(){
  let filtered=DB.filter(e=>{
    if(currentSys!=='all'&&e.sys!==currentSys) return false;
    if(currentSearch){
      const q=currentSearch;
      if(q==='danger') return e.severity==='danger';
      return e.code.toLowerCase().includes(q)||e.name.toLowerCase().includes(q)||
             e.cause.toLowerCase().includes(q)||e.action.toLowerCase().includes(q)||
             (e.msg&&e.msg.toLowerCase().includes(q))||
             (sysLabels[e.sys]&&sysLabels[e.sys].toLowerCase().includes(q));
    }
    return true;
  });

  document.getElementById('results-header').style.display='flex';
  document.getElementById('count-num').textContent=filtered.length;

  if(filtered.length===0){
    document.getElementById('results-list').innerHTML=`
      <div class="no-results"><strong>Sin resultados</strong>Prueba con otro código o síntoma</div>`;
    return;
  }

  document.getElementById('results-list').innerHTML=filtered.map((e,i)=>{
    const isExp=expandedIdx===i;
    const sysLabel=sysLabels[e.sys]||e.sys;
    return `<div class="err-card severity-${e.severity}${isExp?' expanded':''}" onclick="toggleCard(${i})">
      <div class="err-card-header">
        <div class="err-code-badge">${e.code}</div>
        <div class="err-card-info">
          <div class="err-card-name">${e.name}${e.msg?` <span style="color:#888;font-weight:400;font-size:11px">— ${e.msg}</span>`:''}</div>
          <div class="err-card-meta">
            <span class="err-tag">${sysLabel}</span>
            ${e.severity==='danger'?'<span class="err-tag danger-tag">CRÍTICO</span>':''}
          </div>
        </div>
        <div class="err-chevron">›</div>
      </div>
      ${isExp?`<div class="err-card-body">
        <div class="err-detail-grid">
          <div class="err-detail-box">
            <div class="err-detail-label">Causa probable</div>
            <div class="err-detail-val">${e.cause}</div>
          </div>
          <div class="err-detail-box">
            <div class="err-detail-label">Sistema</div>
            <div class="err-detail-val">${sysLabel}</div>
          </div>
        </div>
        <div class="err-action-box">
          <div class="err-action-icon">→</div>
          <div class="err-action-text"><strong style="color:#F6B707">Acción correctiva:</strong> ${e.action}</div>
        </div>
        ${e.severity==='danger'?'<div class="err-danger-box"><div class="err-danger-text">⚠ Error crítico — puede requerir sustitución de componente o parada del AGV.</div></div>':''}
      </div>`:''}
    </div>`;
  }).join('');
}

document.getElementById('search-input').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});
showWelcome();
</script>
